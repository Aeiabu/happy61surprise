<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>一封来自小朋友的信</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }

        body {
            background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* 信封封面 */
        .envelope {
            width: 350px;
            height: 250px;
            background: #fff5e6;
            border-radius: 10px;
            position: relative;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            transition: transform 0.5s ease;
        }

        .envelope:hover {
            transform: translateY(-5px);
        }

        .envelope::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #ffb3b3;
            clip-path: polygon(0 0, 50% 45%, 100% 0, 100% 100%, 0 100%);
            border-radius: 10px 10px 0 0;
            z-index: 2;
            transition: all 0.8s ease;
        }

        .envelope::after {
            content: '点击开启';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 18px;
            color: #fff;
            z-index: 3;
            letter-spacing: 2px;
            text-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        /* 信纸内容 */
        .letter {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            width: 300px;
            height: 200px;
            background: #fff;
            padding: 25px;
            border-radius: 5px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            opacity: 0;
            transition: all 0.8s ease 0.3s;
            z-index: 1;
            overflow-y: auto;
        }

        .letter p {
            font-size: 15px;
            line-height: 1.8;
            color: #555;
            margin-bottom: 15px;
        }

        .letter .sign {
            text-align: right;
            margin-top: 20px;
            font-style: italic;
            color: #888;
        }

        /* 开启动画 */
        .envelope.open::before {
            clip-path: polygon(0 0, 50% 0, 100% 0, 100% 0, 0 0);
        }

        .envelope.open .letter {
            top: -150px;
            opacity: 1;
            transform: translateX(-50%) scale(1.05);
        }

        /* 飘落星星 */
        .star {
            position: absolute;
            color: #ffd700;
            font-size: 20px;
            animation: fall linear infinite;
            opacity: 0.8;
        }

        @keyframes fall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.8; }
            90% { opacity: 0.8; }
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="envelope" id="envelope" onclick="openLetter()">
        <div class="letter" id="letter">
            <p>哈喽！</p >
            <p>学姐六一快乐呀！</p >
            <p>不用一直做大人，今天你可以暂时当回小朋友，不用懂事，不用坚强，只要开心就好啦~</p >
            <p>愿你永远像小朋友一样，眼里有光，心里有爱，对世界永远保持好奇与温柔✨</p >
            <p class="sign">—— 学弟</p >
        </div>
    </div>

    <script>
        // 信封开启逻辑
        function openLetter() {
            document.getElementById('envelope').classList.add('open');
            createStars();
        }

        // 生成飘落星星
        function createStars() {
            for (let i = 0; i < 20; i++) {
                setTimeout(() => {
                    const star = document.createElement('div');
                    star.className = 'star';
                    star.textContent = '★';
                    star.style.left = Math.random() * 100 + 'vw';
                    star.style.animationDuration = (Math.random() * 3 + 2) + 's';
                    document.body.appendChild(star);
                    setTimeout(() => star.remove(), 5000);
                }, i * 150);
            }
        }
    </script>
</body>
</html>
